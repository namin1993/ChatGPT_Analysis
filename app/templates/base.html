<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}Chat-Analysis{% endblock %}</title>
    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='cs/style.css') }}">
    <!-- d3 JavaScript -->
    <script src="https://d3js.org/d3.v5.min.js"></script>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css">
  </head>
  <body>
    <!-- Mobile top navigation -->
    <nav class="navbar navbar-dark bg-dark d-md-none">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                Storyboard
            </a>

            <button
                class="navbar-toggler"
                type="button"
                data-bs-toggle="offcanvas"
                data-bs-target="#mobileSidebar"
                aria-controls="mobileSidebar"
                aria-label="Open navigation"
            >
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>

    <!-- Mobile offcanvas sidebar -->
    <div
        class="offcanvas offcanvas-start text-bg-dark"
        tabindex="-1"
        id="mobileSidebar"
        aria-labelledby="mobileSidebarLabel"
    >
        <div class="offcanvas-header">
            <h2 class="offcanvas-title fs-5" id="mobileSidebarLabel">
                Storyboard
            </h2>

            <button
                type="button"
                class="btn-close btn-close-white"
                data-bs-dismiss="offcanvas"
                aria-label="Close"
            ></button>
        </div>

        <div class="offcanvas-body">
            {% include "_navigation.html" %}
        </div>
    </div>

    <div class="container-fluid">
        <div class="row min-vh-100">
            <!-- Desktop sidebar -->
            <aside
                class="col-md-3 col-lg-2 d-none d-md-block bg-dark p-3"
            >
                <a
                    href="{{ url_for('index') }}"
                    class="d-block mb-4 text-white text-decoration-none fs-5"
                >
                    Storyboard
                </a>

                {% include "_navigation.html" %}
            </aside>

            <!-- Page content -->
            <main
                class="col-12 col-md-9 col-lg-10 p-3 p-lg-4"
                id="content-area"
            >
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        <div class="mb-3">
                            {% for message in messages %}
                                <div
                                    class="alert alert-info alert-dismissible fade show"
                                    role="alert"
                                >
                                    {{ message }}

                                    <button
                                        type="button"
                                        class="btn-close"
                                        data-bs-dismiss="alert"
                                        aria-label="Close"
                                    ></button>
                                </div>
                            {% endfor %}
                        </div>
                    {% endif %}
                {% endwith %}

                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
        crossorigin="anonymous"
    ></script>

    <script
        src="{{ url_for('static', filename='js/index.js') }}"
    ></script>
</body>
</html>
