{% extends "base.html" %}

{% block title %}New Chat | Chat Analysis{% endblock %}

{% block content %}
<div class="chat-page">
    <div class="page-header">
        <h1>New Chat</h1>
        <p>Enter a message to continue your conversation with Jabe.</p>
    </div>

    <div class="chat-card">
        <div id="chatlog-content" class="chat-log">
            {% if chat_log %}
                {{ chat_log }}
            {% else %}
                <span class="text-muted">No messages yet.</span>
            {% endif %}
        </div>

        <form
            action="{{ url_for('chat') }}"
            method="POST"
            class="chat-form"
        >
            <label for="chat-message" class="form-label">
                Enter message
            </label>

            <div class="chat-input-row">
                <textarea
                    name="chat-message"
                    id="chat-message"
                    class="form-control"
                    rows="2"
                    placeholder="Type your message..."
                    required
                ></textarea>

                <button type="submit" class="btn btn-primary">
                    Send
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
